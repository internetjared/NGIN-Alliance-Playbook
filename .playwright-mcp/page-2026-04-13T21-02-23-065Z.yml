              - generic [ref=e59]:
                - heading "About this Tool" [level=3] [ref=e60]
                - paragraph [ref=e61]: "Coalitions are vulnerable to disruption when leaders leave, staff turn over, or funding shifts. The Coalition Continuity Framework helps partnerships document their purpose, roles, agreements, and deliverables so that institutional knowledge survives transitions. It should be completed collectively during a coalition retreat or facilitated session, with every lead partner contributing and smaller partners consulted. The framework is meant to be revisited routinely -- at launch, annually, and whenever leadership, staff, or funding changes occur. One master copy should live in a shared cloud folder, with the convener or fiscal sponsor managing updates. The key reflection question: \"What would continue if our lead left tomorrow, and what would stop?\""
