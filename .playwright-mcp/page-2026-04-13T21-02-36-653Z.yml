            - generic [ref=e55]:
              - paragraph [ref=e60]: "Coalitions often get stuck between idea and implementation. The Rapid Action Planning Template helps teams move from discussion to action by designing short-term projects, typically 3 to 6 months, which build momentum, test ideas, and produce visible progress. It is intentionally lightweight: fast enough to pilot, structured enough to ensure clarity, accountability, and learning. Bring this tool to coalition or community meetings when a new idea emerges or a project needs to restart. Complete it collectively with at least two partner organizations and, if possible, resident voices. Keep pilots manageable, no more than three to five activities and one to three clear outputs. Treat it as a living plan that can adjust mid-project and be debriefed at the end."
