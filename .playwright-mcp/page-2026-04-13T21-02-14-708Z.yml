        - generic [ref=e108]:
          - paragraph [ref=e109]:
            - strong [ref=e110]: Built for Long-Term Impact
          - heading "Building Civic Infrastructure That Lasts" [level=2] [ref=e111]:
            - strong [ref=e113]: Building Civic Infrastructure That Lasts
          - paragraph [ref=e114]: Economic transformation of a community or neighborhood is a result of intentional work of leaders uniting behind a shared, bold vision, and working together to make that vision a reality. Community and economic leaders are catalysts for opportunity – sparking growth and investment, creating jobs, supporting small businesses, building childcare centers or whatever other gaps exist in the community. They know how to design initiatives, secure funding, and deliver visible results.
          - paragraph [ref=e115]: What is harder, and what this Playbook addresses, is the behind-the-scenes work that makes those results possible - building and sustaining the civic infrastructure that keeps progress moving long after a single grant or project ends. Achieving lasting economic progress, especially in communities facing persistent distress demands collaboration, not just good programs. It requires durable cross sector partnerships built on shared decision making, mutual accountability, and the agility to adapt as conditions change.
          - paragraph [ref=e116]: Cross sector partnerships are force multipliers and essential to long term local and regional prosperity. They can multiply impact, build economic stability and strength, and drive innovation in ways that no single organization can accomplish alone. These partnerships between organizations that usually work in different domains, such as local governments, economic development agencies, nonprofit service providers, workforce development organizations, and neighborhood associations bring together different resources and perspectives. Together, they can take on challenges that are too complex for one type of organization to solve on its own.
