<style>
.ngin-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding: 0;
  margin: 0;
}

.ngin-meta__group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ngin-meta__label {
  font-family: Lato, 'Helvetica Neue', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #6B7280;
  margin: 0;
}

.ngin-meta__pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ngin-meta__pill {
  display: inline-block;
  font-family: Lato, 'Helvetica Neue', sans-serif;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid;
  white-space: nowrap;
}

.ngin-meta__pill--navy {
  border-color: #1B3A6B;
  color: #1B3A6B;
}

.ngin-meta__pill--green {
  border-color: #caddbb;
  color: #1B3A6B;
}

.ngin-meta__pill--gray {
  border-color: #9CA3AF;
  color: #6B7280;
}

@media (max-width: 767px) {
  .ngin-meta {
    grid-template-columns: 1fr;
    gap: 20px;
  }
}
</style>

<div class="ngin-meta" id="ngin-meta-output"></div>

<script>
(function() {

  // =============================================
  //  EDIT THIS SECTION FOR EACH CASE STUDY
  //  Just change the text inside the quotes.
  //  Add or remove lines as needed.
  // =============================================

  var organizations = [
    "Maine Multicultural Center (MMCC)",
    "Eastern Maine Development Corp. (EMDC)"
  ];

  var buildingBlocks = [
    "Trust",
    "Shared Narrative",
    "Structure"
  ];

  var relatedTools = [
    "Positionality Statement",
    "Coalition Continuity",
    "Meeting Cadence Kit"
  ];

  // =============================================
  //  DO NOT EDIT BELOW THIS LINE
  // =============================================

  var groups = [
    { label: "Organizations",           items: organizations, color: "navy"  },
    { label: "Building Blocks Featured", items: buildingBlocks, color: "green" },
    { label: "Related Tools",            items: relatedTools,   color: "gray"  }
  ];

  var container = document.getElementById("ngin-meta-output");
  if (!container) return;

  groups.forEach(function(group) {
    if (!group.items.length) return;

    var div = document.createElement("div");
    div.className = "ngin-meta__group";

    var label = document.createElement("p");
    label.className = "ngin-meta__label";
    label.textContent = group.label;
    div.appendChild(label);

    var pills = document.createElement("div");
    pills.className = "ngin-meta__pills";

    group.items.forEach(function(item) {
      var pill = document.createElement("span");
      pill.className = "ngin-meta__pill ngin-meta__pill--" + group.color;
      pill.textContent = item;
      pills.appendChild(pill);
    });

    div.appendChild(pills);
    container.appendChild(div);
  });
})();
</script>
