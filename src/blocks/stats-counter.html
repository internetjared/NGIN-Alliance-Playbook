<style>
.ngin-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 100%;
  padding: 0;
  margin: 0;
}

.ngin-stats__card {
  background: #1e2b38;
  border-radius: 10px;
  padding: 32px 24px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: default;
}

/* Subtle top accent line */
.ngin-stats__card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: #caddbb;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}

.ngin-stats__card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.ngin-stats__card:hover::before {
  transform: scaleX(1);
}

.ngin-stats__number {
  font-family: Lora, Georgia, serif;
  font-size: clamp(2.25rem, 4.5vw, 3rem);
  font-weight: 700;
  color: #caddbb;
  line-height: 1;
  margin: 0 0 8px;
  transition: color 0.3s ease;
}

.ngin-stats__card:hover .ngin-stats__number {
  color: #fff;
}

.ngin-stats__label {
  font-family: Lato, 'Helvetica Neue', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.5);
  line-height: 1.4;
  margin: 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.3s ease;
}

.ngin-stats__card:hover .ngin-stats__label {
  color: rgba(255, 255, 255, 0.85);
}

@media (max-width: 767px) {
  .ngin-stats {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .ngin-stats__card {
    padding: 24px 16px 20px;
  }
  .ngin-stats__number {
    font-size: clamp(1.75rem, 7vw, 2.5rem);
  }
  .ngin-stats__label {
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  /* No hover lift on touch */
  .ngin-stats__card:hover {
    transform: none;
    box-shadow: none;
  }
  .ngin-stats__card::before {
    transform: scaleX(1);
  }
}
</style>

<div class="ngin-stats">
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="24">0</p>
    <p class="ngin-stats__label">Coalitions</p>
  </div>
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="22">0</p>
    <p class="ngin-stats__label">Communities</p>
  </div>
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="64">0</p>
    <p class="ngin-stats__label">Core Organizations</p>
  </div>
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="141">0</p>
    <p class="ngin-stats__label">Orgs Trained</p>
  </div>
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="15">0</p>
    <p class="ngin-stats__label">Tools</p>
  </div>
  <div class="ngin-stats__card">
    <p class="ngin-stats__number" data-ngin-count="9">0</p>
    <p class="ngin-stats__label">Case Studies</p>
  </div>
</div>

<script>
(function() {
  function animateCount(el, target, duration) {
    var startTime = null;

    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      var progress = Math.min((timestamp - startTime) / duration, 1);
      var value = Math.round(ease(progress) * target);
      el.textContent = value;
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        el.textContent = target;
      }
    }

    requestAnimationFrame(step);
  }

  function initStats() {
    var counters = document.querySelectorAll('[data-ngin-count]');
    if (!counters.length) return;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      counters.forEach(function(el) {
        el.textContent = el.getAttribute('data-ngin-count');
      });
      return;
    }

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          if (el.dataset.nginCounted === 'done') return;
          el.dataset.nginCounted = 'done';
          var card = el.closest('.ngin-stats__card');
          var index = card ? Array.from(card.parentElement.children).indexOf(card) : 0;
          var target = parseInt(el.getAttribute('data-ngin-count'), 10);
          var duration = 1400 + (target * 3);
          if (duration > 2400) duration = 2400;
          // Stagger each card by 120ms
          setTimeout(function() {
            animateCount(el, target, duration);
          }, index * 120);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.2 });

    counters.forEach(function(el) {
      observer.observe(el);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initStats);
  } else {
    initStats();
  }
})();
</script>
